<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamma Sonos Player Demo</title>
    <script type="module" src="/src/index.ts"></script>
    <style>
      :root {
        --primary-text-color: #f4f7fb;
        --secondary-text-color: #aeb8c6;
      }

      body {
        background:
          radial-gradient(circle at 20% 10%, #1d3f3d, transparent 34%),
          radial-gradient(circle at 80% 20%, #3b2f4f, transparent 38%),
          #080b10;
        color: var(--primary-text-color);
        display: grid;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        box-sizing: border-box;
        grid-template-columns: minmax(0, 1fr);
        place-items: center;
        width: 100%;
      }

      gamma-sonos-player-card {
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <gamma-sonos-player-card id="player"></gamma-sonos-player-card>

    <script type="module">
      if (!customElements.get('ha-card')) {
        customElements.define('ha-card', class extends HTMLElement {});
      }

      if (!customElements.get('ha-icon')) {
        customElements.define(
          'ha-icon',
          class extends HTMLElement {
            #icon = '';

            get icon() {
              return this.#icon || this.getAttribute('icon') || '';
            }

            set icon(value) {
              this.#icon = value || '';
              this.render();
            }

            static get observedAttributes() {
              return ['icon'];
            }

            connectedCallback() {
              this.render();
            }

            attributeChangedCallback() {
              this.render();
            }

            render() {
              const icon = this.icon;
              this.textContent = icon.includes('skip-previous')
                ? '⏮'
                : icon.includes('skip-next')
                  ? '⏭'
                  : icon.includes('pause')
                    ? 'Ⅱ'
                    : icon.includes('play')
                      ? '▶'
                      : icon.includes('volume-off')
                        ? '🔇'
                        : icon.includes('volume')
                          ? '🔊'
                          : icon.includes('spotify')
                            ? '♬'
                            : icon.includes('magnify')
                              ? '⌕'
                              : '●';
            }
          },
        );
      }

      const states = {
        'media_player.lanai': {
          entity_id: 'media_player.lanai',
          state: 'playing',
          attributes: {
            friendly_name: 'Lanai Sonos',
            platform: 'sonos',
            media_title: 'Sweet Disposition',
            media_artist: 'The Temper Trap',
            media_album_name: 'Conditions',
            media_duration: 240,
            media_position: 84,
            media_position_updated_at: new Date(Date.now() - 1000).toISOString(),
            source: 'Music Assistant',
            entity_picture_local:
              'https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&w=600&q=80',
            volume_level: 0.42,
            is_volume_muted: false,
            group_members: ['media_player.lanai', 'media_player.kitchen'],
          },
        },
        'media_player.kitchen': {
          entity_id: 'media_player.kitchen',
          state: 'paused',
          attributes: {
            friendly_name: 'Kitchen Sonos',
            platform: 'sonos',
            media_title: 'Queue Paused',
            media_artist: 'Sonos',
            volume_level: 0.28,
            group_members: ['media_player.lanai', 'media_player.kitchen'],
          },
        },
        'media_player.bedroom': {
          entity_id: 'media_player.bedroom',
          state: 'idle',
          attributes: {
            friendly_name: 'Bedroom Sonos',
            platform: 'sonos',
            volume_level: 0.18,
            group_members: ['media_player.bedroom'],
          },
        },
        'media_player.ma_lanai': {
          entity_id: 'media_player.ma_lanai',
          state: 'idle',
          attributes: {
            friendly_name: 'Lanai Music Assistant',
            platform: 'music_assistant',
            volume_level: 0.42,
            mass_player_type: 'player',
          },
        },
      };

      const demoQueue = [
        {
          name: 'Nights',
          uri: 'spotify://track/demo-nights',
          artist: 'Frank Ocean',
          queue_item_id: 'demo-queue-1',
          image:
            'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=240&q=80',
        },
        {
          name: 'Electric Feel',
          uri: 'spotify://track/demo-electric-feel',
          artist: 'MGMT',
          queue_item_id: 'demo-queue-2',
          image:
            'https://images.unsplash.com/photo-1524368535928-5b5e00ddc76b?auto=format&fit=crop&w=240&q=80',
        },
        {
          name: 'The Less I Know the Better',
          uri: 'spotify://track/demo-less-i-know',
          artist: 'Tame Impala',
          queue_item_id: 'demo-queue-3',
          image:
            'https://images.unsplash.com/photo-1506157786151-b8491531f063?auto=format&fit=crop&w=240&q=80',
        },
        {
          name: 'Midnight City',
          uri: 'spotify://track/demo-midnight-city',
          artist: 'M83',
          queue_item_id: 'demo-queue-4',
        },
      ];

      const hass = {
        states,
        callService(domain, service, data, target) {
          console.log('service', domain, service, data, target);
          const targetEntityId = target?.entity_id || data?.entity_id || data?.entity;
          const entity = states[targetEntityId];
          if (!entity) return;

          if (domain === 'media_player' && service === 'media_play') entity.state = 'playing';
          if (domain === 'media_player' && service === 'media_pause') entity.state = 'paused';
          if (domain === 'media_player' && service === 'volume_set') {
            entity.attributes.volume_level = Number(data.volume_level);
          }
          if (domain === 'media_player' && service === 'volume_mute') {
            entity.attributes.is_volume_muted = Boolean(data.is_volume_muted);
          }
          if (domain === 'media_player' && service === 'join') {
            entity.attributes.group_members = [...new Set([
              ...(entity.attributes.group_members || [entity.entity_id]),
              ...data.group_members,
            ])];
            entity.attributes.group_members.forEach((memberId) => {
              if (states[memberId]) {
                states[memberId].attributes.group_members = [...entity.attributes.group_members];
              }
            });
          }
          if (domain === 'media_player' && service === 'unjoin') {
            entity.attributes.group_members = [entity.entity_id];
          }
          if (service === 'play_media' || domain === 'music_assistant') {
            entity.state = 'playing';
            entity.attributes.media_title = String(data.media_id || data.media_content_id || 'Search result');
            entity.attributes.media_artist = domain === 'music_assistant' ? 'Music Assistant' : 'Spotify/Sonos';

            if ((data.enqueue === 'add' || data.enqueue === 'next') && data.media_id) {
              demoQueue.push({
                name: String(data.media_id).split('/').pop() || String(data.media_id),
                uri: String(data.media_id),
                artist: 'Added from Browse',
                queue_item_id: `demo-queue-${Date.now()}`,
              });
            }
          }

          player.hass = { ...hass, states: { ...states } };
        },
        async callWS(message) {
          console.log('ws', message);

          if (message.domain === 'music_assistant' && message.service === 'get_queue') {
            const entityId = message.service_data?.entity_id || 'media_player.ma_lanai';
            return {
              response: {
                [entityId]: {
                  current_item: {
                    name: states['media_player.lanai'].attributes.media_title,
                    artist: states['media_player.lanai'].attributes.media_artist,
                    uri: 'spotify://track/demo-current',
                  },
                  items: demoQueue,
                },
              },
            };
          }

          if (message.domain === 'music_assistant' && message.service === 'get_library') {
            const type = message.service_data?.media_type;
            const library = {
              playlist: [
                { name: 'Infinite Mix (favorites)', uri: 'builtin://playlist/infinite-favorites', media_type: 'playlist' },
                { name: 'Infinite Mix (library)', uri: 'builtin://playlist/infinite-library', media_type: 'playlist' },
                { name: 'Sunday Morning', uri: 'spotify://playlist/sunday', media_type: 'playlist', image: 'https://images.unsplash.com/photo-1487180144351-b8472da7d491?auto=format&fit=crop&w=360&q=80' },
                { name: 'Dinner & Wine', uri: 'spotify://playlist/dinner', media_type: 'playlist', image: 'https://images.unsplash.com/photo-1511379938547-c1f69419868d?auto=format&fit=crop&w=360&q=80' },
                { name: 'Backyard Nights', uri: 'spotify://playlist/backyard', media_type: 'playlist', image: 'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=360&q=80' },
              ],
              album: [
                { name: 'Currents', uri: 'spotify://album/currents', media_type: 'album', artist: 'Tame Impala', image: 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=360&q=80' },
                { name: 'Blonde', uri: 'spotify://album/blonde', media_type: 'album', artist: 'Frank Ocean', image: 'https://images.unsplash.com/photo-1524368535928-5b5e00ddc76b?auto=format&fit=crop&w=360&q=80' },
                { name: 'Conditions', uri: 'spotify://album/conditions', media_type: 'album', artist: 'The Temper Trap', image: 'https://images.unsplash.com/photo-1506157786151-b8491531f063?auto=format&fit=crop&w=360&q=80' },
              ],
              artist: [
                { name: 'Frank Ocean', uri: 'spotify://artist/frank-ocean', media_type: 'artist' },
                { name: 'Tame Impala', uri: 'spotify://artist/tame-impala', media_type: 'artist' },
                { name: 'The Temper Trap', uri: 'spotify://artist/temper-trap', media_type: 'artist' },
              ],
              track: [
                { name: 'Nights', uri: 'spotify://track/nights', media_type: 'track', artist: 'Frank Ocean' },
                { name: 'Electric Feel', uri: 'spotify://track/electric-feel', media_type: 'track', artist: 'MGMT' },
                { name: 'Midnight City', uri: 'spotify://track/midnight-city', media_type: 'track', artist: 'M83' },
              ],
            };
            return {
              response: {
                items: library[type] || [],
                media_type: type,
                limit: 12,
                offset: 0,
              },
            };
          }

          return {
            response: {
              tracks: [
                {
                  name: 'Nights',
                  uri: 'spotify://track/demo-nights',
                  artists: [{ name: 'Frank Ocean' }],
                },
                {
                  name: 'Electric Feel',
                  uri: 'spotify://track/demo-electric-feel',
                  artists: [{ name: 'MGMT' }],
                },
              ],
              albums: [
                {
                  name: 'Currents',
                  uri: 'spotify://album/demo-currents',
                  artists: [{ name: 'Tame Impala' }],
                },
              ],
            },
          };
        },
      };

      const player = document.querySelector('#player');
      player.setConfig({
        name: 'Lanai Music',
        entities: ['media_player.lanai', 'media_player.kitchen', 'media_player.bedroom'],
        music_assistant_entities: ['media_player.ma_lanai'],
        music_assistant_config_entry_id: 'demo-music-assistant',
        show_party: true,
        party_start_service: 'rest_command.party_screen_start',
        party_stop_service: 'rest_command.party_screen_stop',
        party_dashboard_url: 'https://music.example.com/#/party',
        party_screen_name: 'Living Room Apple TV',
        entity: 'media_player.lanai',
        enqueue_mode: 'next',
      });
      player.hass = hass;
      const previewTab = new URLSearchParams(window.location.search).get('tab');
      if (['now', 'search', 'queue', 'speakers', 'party'].includes(previewTab)) {
        window.setTimeout(() => {
          player.initialTabResolved = true;
          player.activeTab = previewTab;
          player.requestUpdate();
        }, 100);
      }
    </script>
  </body>
</html>
