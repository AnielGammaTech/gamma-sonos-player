# Gamma Sonos Player Workflow Feature Development With Preview And Tests

## Action

Follow the feature-development-with-preview-and-tests workflow:
1. Create or update UI component in src/cards/
2. Add or update shared logic/helper in src/shared/
3. Write unit tests for helper in src/shared/*.test.ts
4. Update or add preview harness in tools/preview/ (index.html, .gitignore, shots/)
5. Update package.json and package-lock.json if dependencies or scripts change
6. Build and update dist/ and root .js/.js.map files

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: src/cards/*.ts, src/shared/*.ts, src/shared/*.test.ts

